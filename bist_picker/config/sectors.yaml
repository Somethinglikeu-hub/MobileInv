# BIST Stock Picker — Custom Sub-Sector Mapping
# Maps tickers to our custom sub-sectors (30+ categories).
# BIST's official sectors are too coarse for meaningful sector-neutral scoring.

# Custom sub-sector definitions
sub_sectors:
  - steel
  - automotive
  - food_retail
  - food_production
  - banking_private
  - banking_state
  - insurance
  - telecom
  - airlines
  - defense
  - energy_power
  - energy_oil_gas
  - chemicals
  - cement
  - glass
  - textiles
  - paper
  - technology_hardware
  - technology_software
  - healthcare_pharma
  - healthcare_services
  - real_estate
  - construction
  - logistics
  - retail_general
  - tourism_hotels
  - media
  - mining
  - agriculture
  - holding_diversified
  - holding_industrial
  - financial_services
  - other

# Manual ticker → sub-sector mapping (at least BIST 100 tickers)
# Add more tickers as they are encountered
ticker_mapping:
  # Airlines
  THYAO: airlines
  PGSUS: airlines

  # Defense
  ASELS: defense

  # Food retail
  BIMAS: food_retail
  MGROS: food_retail
  SOKM: food_retail

  # Food production
  ULKER: food_production
  BANVT: food_production
  TATGD: food_production
