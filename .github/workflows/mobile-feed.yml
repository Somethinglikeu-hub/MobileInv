name: Publish Mobile Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1-5"
    - cron: "17 16 * * 1-5"

concurrency:
  group: mobile-feed-publish
  cancel-in-progress: false

permissions:
  contents: read
  issues: write  # needed to open/close the macro-staleness reminder issue

jobs:
  publish-mobile-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      STATE_REPOSITORY: ${{ vars.BIST_STATE_REPOSITORY || format('{0}/MobileInv-state', github.repository_owner) }}
      FEED_REPOSITORY: ${{ vars.BIST_FEED_REPOSITORY || format('{0}/MobileInv-feed', github.repository_owner) }}
      STATE_BRANCH: ${{ vars.BIST_STATE_BRANCH || 'main' }}
      FEED_BRANCH: ${{ vars.BIST_FEED_BRANCH || 'gh-pages' }}
      TCMB_API_KEY: ${{ secrets.TCMB_API_KEY }}
      PUBLISH_REPO_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}

    steps:
      - name: Check out code repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate required configuration
        run: |
          python - <<'PY'
          import os
          state_repository = os.environ.get("STATE_REPOSITORY")
          feed_repository = os.environ.get("FEED_REPOSITORY")
          publish_repo_token = os.environ.get("PUBLISH_REPO_TOKEN")

          if not state_repository:
              raise SystemExit("STATE_REPOSITORY could not be derived.")
          if not feed_repository:
              raise SystemExit("FEED_REPOSITORY could not be derived.")
          if not publish_repo_token:
              raise SystemExit("Missing workflow secret: PUBLISH_REPO_TOKEN")

          print(f"Using STATE_REPOSITORY={state_repository}")
          print(f"Using FEED_REPOSITORY={feed_repository}")
          PY

      - name: Derive raw GitHub feed URL
        run: |
          echo "FEED_BASE_URL=https://raw.githubusercontent.com/${FEED_REPOSITORY}/${FEED_BRANCH}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[phase1-data,dev]"

      - name: Restore runtime database from private state repo
        run: |
          set -euxo pipefail
          git clone "https://x-access-token:${PUBLISH_REPO_TOKEN}@github.com/${STATE_REPOSITORY}.git" state-repo
          cd state-repo
          git checkout "${STATE_BRANCH}" || git checkout -B "${STATE_BRANCH}"
          cd ..
          mkdir -p data
          if [ -f "state-repo/state/current/bist_picker.db.gz" ]; then
          python - <<'PY'
          import gzip
          import shutil
          from pathlib import Path

          source = Path("state-repo/state/current/bist_picker.db.gz")
          target = Path("data/bist_picker.db")
          with gzip.open(source, "rb") as input_file, target.open("wb") as output_file:
              shutil.copyfileobj(input_file, output_file)
          PY
          fi

      - name: Run pipeline and export mobile feed
        run: |
          python -m bist_picker fetch
          python -m bist_picker clean
          python -m bist_picker score
          python -m bist_picker pick
          python -m bist_picker export-mobile-feed \
            --feed-dir mobile-feed-dist \
            --base-download-url "${FEED_BASE_URL}"

      - name: Update private state repo
        run: |
          set -euxo pipefail
          mkdir -p state-repo/state/current
          python - <<'PY'
          import gzip
          import shutil
          from pathlib import Path

          source = Path("data/bist_picker.db")
          target = Path("state-repo/state/current/bist_picker.db.gz")
          with source.open("rb") as input_file, gzip.open(target, "wb") as output_file:
              shutil.copyfileobj(input_file, output_file)
          PY
          cd state-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add state/current/bist_picker.db.gz
            git commit -m "Update mobile pipeline state"
            git push origin "${STATE_BRANCH}"
          fi

      - name: Check macro config staleness
        id: macro_check
        continue-on-error: true
        run: |
          set +e
          python -m bist_picker.macro_check --json > macro_check.json
          status=$?
          echo "is_stale=$([ $status -eq 1 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          cat macro_check.json
          exit 0

      - name: Open or update stale-macro issue
        if: steps.macro_check.outputs.is_stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('macro_check.json', 'utf8'));
            const title = '[macro] Update required — Damodaran ERP refresh';
            const lines = [
              'The pipeline detected stale manual-review macro values.',
              '',
              `**Checked at:** ${report.checked_at}`,
              '',
              '### Stale fields',
              '',
            ];
            for (const f of report.stale_fields) {
              lines.push(`- \`${f.field}\` — last updated **${f.last_updated}** (${f.age_days}d ago, threshold ${f.stale_after_days}d)`);
              lines.push(`  - Current value: \`${f.current_value}\``);
              if (f.source_url) lines.push(`  - Source: ${f.source_url}`);
              lines.push('');
              lines.push('  **How to update:**');
              for (const step of f.update_instructions.split('\n')) {
                lines.push(`  ${step}`);
              }
              lines.push('');
            }
            lines.push('_This issue is opened automatically by the Publish Mobile Feed workflow and will close on the next successful run once values are fresh._');
            const body = lines.join('\n');
            const { owner, repo } = context.repo;

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'macro-stale',
              per_page: 50,
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.update({
                owner, repo, issue_number: match.number, body,
              });
              core.info(`Updated existing issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: ['macro-stale'],
              });
              core.info(`Opened issue #${created.data.number}`);
            }

      - name: Close stale-macro issue when fresh
        if: steps.macro_check.outputs.is_stale == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[macro] Update required — Damodaran ERP refresh';
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'macro-stale',
              per_page: 50,
            });
            for (const issue of existing.data) {
              if (issue.title !== title) continue;
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: 'Closing automatically: macro config refreshed and no longer stale.',
              });
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: 'closed',
              });
              core.info(`Closed issue #${issue.number}`);
            }

      - name: Check cash-allocation state (Phase 4)
        id: cash_status
        continue-on-error: true
        run: |
          set +e
          python -m bist_picker cash-status --json > cash_status.json
          status=$?
          echo "transitioned=$([ $status -eq 1 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          cat cash_status.json
          exit 0

      - name: Notify on cash-state transition
        if: steps.cash_status.outputs.transitioned == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const snap = JSON.parse(fs.readFileSync('cash_status.json', 'utf8'));
            const title = `[portfolio] Cash state changed \u2192 ${snap.state}`;
            const lines = [
              `The Phase 4 cash-allocation signal transitioned on **${snap.date}**.`,
              '',
              `- **New state:** \`${snap.state}\` (cash_pct = ${Math.round((snap.cash_pct || 0) * 100)}%)`,
              `- **Raw signal:** ${snap.raw_signal} (market=${snap.market_regime}, macro=${snap.macro_regime})`,
              `- **Target (signal-only):** ${snap.target_state}`,
              `- **Next transition allowed on or after:** ${snap.next_possible_transition_date || 'n/a'}`,
              '',
              '#### What this means',
              'Position weights on the next rebalance will be scaled so that',
              '`sum(weights) = 1 - cash_pct`. No trades are executed automatically;',
              'this is an advisory signal mirrored into the mobile snapshot.',
              '',
              'Tune the hysteresis in `bist_picker/config/cash_signal.yaml` or flip',
              '`enabled: false` to disable the signal without losing the logging.',
              '',
              `_Notes from the state machine:_ ${snap.notes || 'none'}`,
              '',
              '_This issue is opened automatically by the Publish Mobile Feed workflow._',
            ];
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const created = await github.rest.issues.create({
              owner, repo, title, body, labels: ['cash-signal'],
            });
            core.info(`Opened cash-state issue #${created.data.number}`);

      - name: Publish manifest and snapshot to public feed repo
        run: |
          set -euxo pipefail
          git clone "https://x-access-token:${PUBLISH_REPO_TOKEN}@github.com/${FEED_REPOSITORY}.git" feed-repo
          cd feed-repo
          git checkout "${FEED_BRANCH}" || git checkout --orphan "${FEED_BRANCH}"
          cd ..
          cp mobile-feed-dist/manifest.json feed-repo/manifest.json
          cp mobile-feed-dist/mobile_snapshot.db.gz feed-repo/mobile_snapshot.db.gz
          cd feed-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add manifest.json mobile_snapshot.db.gz
            git commit -m "Publish mobile feed"
            git push origin "${FEED_BRANCH}"
          fi
